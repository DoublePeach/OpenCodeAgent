name: CI

on:
  push:
    branches: [master, main, 'feature/**', 'fix/**']
  pull_request:
    branches: [master, main]

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version check
        run: bun run --bun src/entrypoints/cli.tsx --version

      - name: Lint (Biome)
        run: bun run lint
        continue-on-error: true  # pre-existing decompiler warnings are non-blocking

      - name: Build
        run: bun run build

      - name: Smoke test (pipe mode)
        run: |
          echo "smoke test" | timeout 10 bun run --bun src/entrypoints/cli.tsx -p "say ok" \
            || true  # exit 1 is expected with no real API key

  type-check:
    name: Type Check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true   # ~1341 pre-existing tsc errors from decompilation
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: TSC (non-blocking)
        run: bunx tsc --noEmit 2>&1 | tail -5 || true
